# .github/workflows/ci.yml
#
# CI/CD Pipeline — DataFlow E-Commerce Platform
# Déclenché sur chaque push/PR vers main
# Tests : dbt, pytest, Great Expectations

name: CI — DataFlow Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

jobs:

  # ─────────────────────────────────────────
  # Job 1 — Lint + Unit Tests
  # ─────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --cov=transforms \
            --cov=cache \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # ─────────────────────────────────────────
  # Job 2 — dbt compile + tests
  # ─────────────────────────────────────────
  test-dbt:
    name: dbt Tests
    runs-on: ubuntu-latest
    needs: test-unit
    env:
      SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: pip install dbt-snowflake==1.7.4

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          dataflow_ecommerce:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                schema: MARTS_CI
                threads: 4
          EOF

      - name: dbt compile
        working-directory: models/dataflow_ecommerce
        run: dbt compile

      - name: dbt test
        working-directory: models/dataflow_ecommerce
        run: dbt test --exclude my_first_dbt_model my_second_dbt_model

  # ─────────────────────────────────────────
  # Job 3 — Validate configs
  # ─────────────────────────────────────────
  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML configs
        run: |
          pip install pyyaml jsonschema
          python -c "
          import yaml, glob
          for f in glob.glob('ingestion/**/*.yaml', recursive=True):
              with open(f) as fh:
                  yaml.safe_load(fh)
              print(f'✓ {f}')
          print('All YAML configs valid')
          "

      - name: Validate JSON schemas
        run: |
          python -c "
          import json, glob
          for f in glob.glob('ingestion/**/*.json', recursive=True):
              with open(f) as fh:
                  json.load(fh)
              print(f'✓ {f}')
          print('All JSON schemas valid')
          "

  # ─────────────────────────────────────────
  # Job 4 — Deploy (main branch only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-unit, test-dbt, validate-configs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy dbt models
        working-directory: models/dataflow_ecommerce
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          pip install dbt-snowflake==1.7.4
          dbt run --select marts.*
          dbt test --exclude my_first_dbt_model my_second_dbt_model

      - name: Notify Slack on success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_DATA_ALERTS }} \
            -H 'Content-type: application/json' \
            -d '{"text": " DataFlow Platform deployed successfully to production"}'

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_DATA_ALERTS }} \
            -H 'Content-type: application/json' \
            -d '{"text": " DataFlow Platform deployment FAILED — check GitHub Actions"}'
